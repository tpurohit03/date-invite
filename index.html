<form action="https://formspree.io/f/xqeojgpr" method="POST">
  <h2>Will you go on a date with me? ❤️</h2>

  <button type="button" onclick="showChoices()">Yes</button>
  <button type="button" id="noBtn" onmouseover="moveNo()">No</button>

  <div id="choices" style="display:none;">
    <p>Pick cuisine:</p>
    <select name="cuisine">
      <option>Italian</option>
      <option>Mexican</option>
      <option>Indian</option>
      <option>Surprise me</option>
    </select>

    <p>Pick date/time:</p>
    <input type="datetime-local" name="date_time">

    <input type="hidden" name="message" value="Wife accepted date. Tiny boss is joining too.">

    <br><br>
    <button type="submit">Confirm Date ❤️</button>
  </div>
</form>

<script>
function showChoices() {
  document.getElementById("choices").style.display = "block";
}

function moveNo() {
  const btn = document.getElementById("noBtn");
  btn.style.position = "relative";
  btn.style.left = Math.random() * 200 - 100 + "px";
  btn.style.top = Math.random() * 100 - 50 + "px";
}
</script>
