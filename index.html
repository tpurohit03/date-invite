<!DOCTYPE html>
<html>
<head>
  <title>Date Request</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #fff3f7;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 420px;
      margin: auto;
      box-shadow: 0 5px 20px #ddd;
    }
    button {
      padding: 14px 25px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }
    #yes { background: #ff4f8b; color: white; }
    #no { background: #ddd; position: relative; }
    select, input {
      padding: 12px;
      margin: 10px;
      width: 80%;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<div class="card" id="step1">
  <h2>Will you go on a date with me? ❤️</h2>
  <p>Baby is joining too because we are a package deal 👶</p>
  <button id="yes" onclick="showStep2()">Yes</button>
  <button id="no" onmouseover="moveNo()">No</button>
</div>

<div class="card" id="step2" style="display:none;">
  <h2>Good choice 😄</h2>
  <p>Pick the cuisine:</p>
  <select id="cuisine">
    <option>Italian</option>
    <option>Mexican</option>
    <option>Indian</option>
    <option>Thai</option>
    <option>Surprise me</option>
  </select>

  <p>Pick date and time:</p>
  <input type="datetime-local" id="datetime">

  <button id="yes" onclick="finish()">Confirm Date</button>
</div>

<div class="card" id="final" style="display:none;">
  <h2>Booked in my heart ❤️</h2>
  <p id="summary"></p>
  <p>I will pick up you and the little boss. Please be ready, both of you. 😄👶</p>
</div>

<script>
function moveNo() {
  const no = document.getElementById("no");
  no.style.left = Math.random() * 160 - 80 + "px";
  no.style.top = Math.random() * 100 - 50 + "px";
}

function showStep2() {
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function finish() {
  const cuisine = document.getElementById("cuisine").value;
  const datetime = document.getElementById("datetime").value;

  document.getElementById("step2").style.display = "none";
  document.getElementById("final").style.display = "block";
  document.getElementById("summary").innerText =
    "Cuisine: " + cuisine + " | Time: " + datetime;
}
</script>

</body>
</html>
